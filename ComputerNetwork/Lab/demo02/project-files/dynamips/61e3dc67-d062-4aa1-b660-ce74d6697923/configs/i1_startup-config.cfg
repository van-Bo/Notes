!
!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
no service dhcp
!
hostname ESW1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
no ip dhcp use vrf connected
ip dhcp excluded-address 23.23.3.1
ip dhcp excluded-address 23.23.0.1
ip dhcp excluded-address 23.23.2.1
!
ip dhcp pool vlan10
   network 23.23.3.0 255.255.255.128
   dns-server 23.23.3.180 
   default-router 23.23.3.1 
!
ip dhcp pool vlan20
   network 23.23.0.0 255.255.254.0
   dns-server 23.23.3.180 
   default-router 23.23.0.1 
!
ip dhcp pool vlan30
   network 23.23.2.0 255.255.255.0
   dns-server 23.23.3.180 
   default-router 23.23.2.1 
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
vtp file nvram:vlan.dat

!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 description *** Unused for Layer2 EtherSwitch ***
 ip address 1.1.1.1 255.255.255.0
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description *** Unused for Layer2 EtherSwitch ***
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet1/0
 duplex full
 speed 100
!
interface FastEthernet1/1
 switchport access vlan 10
 duplex full
 speed 100
!
interface FastEthernet1/2
 duplex full
 speed 100
!
interface FastEthernet1/3
 duplex full
 speed 100
!
interface FastEthernet1/4
 switchport access vlan 20
 duplex full
 speed 100
!
interface FastEthernet1/5
 duplex full
 speed 100
!
interface FastEthernet1/6
 duplex full
 speed 100
!
interface FastEthernet1/7
 switchport access vlan 30
 duplex full
 speed 100
!
interface FastEthernet1/8
 duplex full
 speed 100
!
interface FastEthernet1/9
 duplex full
 speed 100
!
interface FastEthernet1/10
 duplex full
 speed 100
!
interface FastEthernet1/11
 switchport mode trunk
 duplex full
 speed 100
!
interface FastEthernet1/12
 duplex full
 speed 100
!
interface FastEthernet1/13
 duplex full
 speed 100
!
interface FastEthernet1/14
 switchport access vlan 80
 duplex full
 speed 100
!
interface FastEthernet1/15
 switchport access vlan 80
 duplex full
 speed 100
!
interface Vlan1
 no ip address
 shutdown
!
interface Vlan10
 ip address 23.23.3.1 255.255.255.128
!
interface Vlan20
 ip address 23.23.0.1 255.255.255.0
!
interface Vlan30
 ip address 23.23.2.1 255.255.255.0
!
interface Vlan80
 ip address 23.23.3.129 255.255.255.128
!
!
router rip
 version 2
 network 1.0.0.0
 network 23.0.0.0
 network 192.168.52.0
!
no ip http server
no ip http secure-server
ip forward-protocol nd
ip route 192.168.52.0 255.255.255.0 1.1.1.2
!
!
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
banner exec 

***************************************************************
This is a normal Router with a SW module inside (NM-16ESW)
It has been preconfigured with hard coded speed and duplex

To create vlans use the command "vlan database" from exec mode
After creating all desired vlans use "exit" to apply the config

To view existing vlans use the command "show vlan-switch brief"

Warning: You are using an old IOS image for this router.
Please update the IOS to enable the "macro" command!
***************************************************************


!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
